org = "rust-lang"
name = "blog.rust-lang.org"
description = "Home of the Rust and Inside Rust blogs"
homepage = "https://blog.rust-lang.org"
bots = ["rustbot", "renovate"]

[pages]
build-type = "workflow"

[access.teams]
foundation-board-project-directors = "write"
leadership-council = "write"
leads = "write"
program = "write"
project-group-leads = "write"
website = "maintain"
# For Rust release blog posts
release = "write"

[[rulesets]]
pattern = "main"
ci-checks = [
    "lint",
    "build",
]
require-conversation-resolution = true
# Allow promote release to push without PRs
allowed-merge-apps = ["promote-release"]
merge-queue = { enabled = true }

[environments.github-pages]
branches = ["gh-readonly-queue/main/*"]
