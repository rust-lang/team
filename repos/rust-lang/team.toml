org = "rust-lang"
name = "team"
description = "Rust teams structure"
bots = ["forking-renovate"]

[access.teams]
mods = "write"
team-repo-admins = "write"
infra = "triage"

[[branch-protections]]
pattern = "main"
ci-checks = ["CI"]
dismiss-stale-review = true
merge-queue = { enabled = true, max-entries-to-build = 1, max-entries-to-merge = 1 }

[environments.deploy]
branches = ["gh-readonly-queue/main/*", "main"]

[environments.github-pages]
branches = ["main"]
