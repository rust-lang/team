org = "rust-lang"
name = "rust"
description = "Empowering everyone to build reliable and efficient software."
homepage = "https://www.rust-lang.org"
bots = ["bors", "craterbot", "glacierbot", "log-analyzer", "rustbot", "rfcbot", "rust-timer"]

[access.teams]
bootstrap = "write"
cargo = "write"
clippy = "write"
compiler = "write"
compiler-ops = "triage"
infra = "write"
lang = "write"
lang-ops = "write"
libs = "write"
libs-api = "write"
libs-contributors = "write"
opsem = "write"
project-exploit-mitigations = "write"
project-stable-mir = "write"
release = "write"
rustdoc = "write"
rustfmt = "write"
rust-analyzer = "write"
style = "write"
types = "write"
triage = "write"

[[branch-protections]]
pattern = "main"
allowed-merge-apps = ["bors"]

[[branch-protections]]
pattern = "stable"
allowed-merge-apps = ["bors"]

[[branch-protections]]
pattern = "beta"
allowed-merge-apps = ["bors"]

[[branch-protections]]
pattern = "*"

[[branch-protections]]
pattern = "*/**/*"
pr-required = false

[[branch-protections]]
pattern = "cargo_update"
pr-required = false

# Required for running try builds created by bors.
# Must support force-pushes.
[[branch-protections]]
pattern = "automation/bors/try"
allowed-merge-apps = ["bors"]

# Required for running try builds created by bors.
# Must support force-pushes.
[[branch-protections]]
pattern = "automation/bors/try-merge"
allowed-merge-apps = ["bors"]

# Required for running auto builds created by bors.
# Must support force-pushes.
[[branch-protections]]
pattern = "automation/bors/auto"
allowed-merge-apps = ["bors"]

# Required for running auto builds created by bors.
# Must support force-pushes.
[[branch-protections]]
pattern = "automation/bors/auto-merge"
allowed-merge-apps = ["bors"]

# Required for unrolled PR builds created by perfbot.
# Must support force-pushes.
[[branch-protections]]
pattern = "try-perf"
allowed-merge-apps = ["rust-timer"]
pr-required = false

# Required for unrolled PR builds created by perfbot.
# Must support force-pushes.
[[branch-protections]]
pattern = "perf-tmp"
allowed-merge-apps = ["rust-timer"]
pr-required = false

[environments.bors]
branches = ["automation/bors/auto", "automation/bors/try", "try-perf"]
