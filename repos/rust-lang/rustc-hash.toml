org = "rust-lang"
name = "rustc-hash"
description = "Custom hash algorithm used by rustc (plus hashmap/set aliases): fast, deterministic, not secure"
bots = []

[access.teams]
compiler = "write"

[[rulesets]]
pattern = "main"

[environments.publish]
branches = ["main"]

[[crates-io]]
crates = ["rustc-hash"]
publish-workflow = "publish.yml"
publish-environment = "publish"
teams = ["compiler"]
