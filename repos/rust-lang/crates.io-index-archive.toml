org = "rust-lang"
name = "crates.io-index-archive"
description = "Archive of the crates.io-index commit history after squashes"
bots = []

[access.teams]
crates-io = "maintain"

[[rulesets]]
pattern = "snapshot-*"
pr-required = false
prevent-creation = false

[[rulesets]]
pattern = "main"
pr-required = false
