org = "rust-lang"
name = "rust-analyzer"
description = "A Rust compiler front-end for IDEs"
homepage = "https://rust-analyzer.github.io/"
bots = ["rustbot"]

[pages]
build-type = "legacy"
branch = "gh-pages"
path = "/"

[access.teams]
rust-analyzer = "write"
rust-analyzer-contributors = "triage"
cargo = "triage"
clippy = "triage"
compiler = "triage"
triage = "triage"

[[rulesets]]
pattern = "master"
ci-checks = ["conclusion"]
required-approvals = 0
merge-queue = { enabled = true }

[environments.github-pages]
